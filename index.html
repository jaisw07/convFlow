<!DOCTYPE html>
<html>

<head>
    <title>LiveKit Interview Test</title>
</head>

<body>
    <h2>LiveKit Interview Test</h2>
    <button onclick="connectRoom()">Connect</button>
    <script type="module">
        import { Room } from "https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.esm.mjs";

        async function fetchToken() {
            const res = await fetch("http://localhost:8000/token");
            const data = await res.json();
            return data;
        }

        window.connectRoom = async function () {
            const data = await fetchToken();

            const room = new Room();

            room.on("trackSubscribed", (track, publication, participant) => {
                if (track.kind === "audio") {
                    console.log("Subscribed to audio track from:", participant.identity);
                    const audioElement = track.attach();
                    document.body.appendChild(audioElement);
                }
            });

            await room.connect("ws://localhost:7880", data.token);

            await room.localParticipant.enableCameraAndMicrophone();

            console.log("Connected to LiveKit room:", data.room);
        };
    </script>
</body>

</html>
